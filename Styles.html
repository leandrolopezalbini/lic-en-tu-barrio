<style>

/* VARIABLES */
:root{
  --azul:#1565c0;
  --azul-oscuro:#1a237e;
  --celeste:#e3f2fd;
  --verde:#2e7d32;
  --rojo:#d32f2f;
  --naranja:#ffa000;
  --gris-bg:#f0f2f5;

  --shadow-soft:0 4px 20px rgba(0,0,0,0.08);
  --shadow-strong:0 10px 30px rgba(0,0,0,0.15);
}

/* BASE */
body{
  background:var(--gris-bg);
  font-family:'Roboto', sans-serif;
}

input,select,textarea{
  border-radius:8px !important;
}

/* HERO */
.hero{
  text-align:center;
  margin-bottom:30px;
}

.hero img{
  max-height:90px;
}

/* CARDS */
.card-ui,
.exam-card{
  background:white;
  border-radius:20px;
  padding:25px;
  box-shadow:var(--shadow-soft);
}

/* BOTONES */
.btn,.btn-large{
  border-radius:10px;
  font-weight:600;
}

.btn-primary{
  background:var(--azul);
}
.btn-primary:hover{
  background:var(--azul-oscuro);
}

/* OPCIONES */
.option-btn{
  width:100%;
  padding:15px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:12px;
  background:white;
  transition:.2s;
}

.option-btn:hover{
  background:#f5f7fa;
  border-color:var(--azul);
}

.option-btn:active{
  transform:scale(0.97);
}

/* TIMER */
.timer-bar{
  height:10px;
  background:#eee;
  border-radius:5px;
  margin:15px 0;
}

.timer-fill{
  height:100%;
  background:linear-gradient(90deg,#4caf50,#81c784);
}

/* ANIMACIÓN */
.fade{
  animation:fadeIn .25s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1;}
}

/* TABLAS */
.tabla-alumnos{
  background:white;
  border-radius:12px;
  padding:10px;
}

/* MOBILE */
@media(max-width:768px){

  table thead{ display:none; }

  table tr{
    display:block;
    margin-bottom:15px;
    background:white;
    padding:10px;
    border-radius:12px;
  }

  table td{
    display:flex;
    justify-content:space-between;
    padding:6px;
  }

  .exam-card{
    padding:20px;
  }
}

/* UTIL */
.bold{ font-weight:bold; }

</style>
