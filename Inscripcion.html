<!DOCTYPE html>
<html>

<head>
  <base target="_top">

  <!-- Materialize -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

  <!-- Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      background: #f5f7fa;
      padding-bottom: 30px;
    }

    .header-inst {
      background: white;
      padding: 20px;
      border-bottom: 4px solid #1565c0;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>

  <div class="header-inst center-align">
    <h5 class="bold blue-text text-darken-4">Sistema de Licencias</h5>
  </div>

  <!-- BOTON SALIR -->
  <a id="btnSalir" target="_top" class="btn-large blue darken-4">Salir</a>

  <div class="container">
    <div class="form-container">

      <h5 class="center-align" style="margin-bottom:30px;">Formulario de Inscripción</h5>

      <form id="formInscripcion">

        <div class="row">
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">person</i>
            <input type="text" id="nombre">
            <label for="nombre">Nombre</label>
          </div>

          <div class="input-field col s12 m6">
            <i class="material-icons prefix">person_outline</i>
            <input type="text" id="apellido">
            <label for="apellido">Apellido</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">badge</i>
            <input type="number" id="dni">
            <label for="dni">DNI</label>
          </div>

          <div class="input-field col s12 m6">
            <i class="material-icons prefix">cake</i>
            <input type="date" id="fechaNacimiento">
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">email</i>
            <input type="email" id="email">
            <label for="email">Correo</label>
          </div>

          <div class="input-field col s12 m6">
            <i class="material-icons prefix">phone</i>
            <input type="tel" id="telefono">
            <label for="telefono">Teléfono</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12">
            <select id="categoria">
              <option value="" disabled selected>Seleccione Categoría</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="AyB">A y B</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12 m6">
            <select id="selectBarrio"></select>
            <label>Barrio</label>
          </div>

          <div class="input-field col s12 m6">
            <select id="selectInstitucion"></select>
            <label>Institución</label>
          </div>
        </div>

        <button type="submit" id="btnEnviar" class="btn-large blue darken-3">
          Enviar
        </button>

      </form>
    </div>
  </div>

  <!-- LIBS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

  <!-- CONFIG SEGURA -->
  <script>
    const CONFIG = {
      url: "<?= inst.url ?>"
    };
  </script>

  <!-- API -->
  <script>
    const API = {
      call(nombre, ...args) {
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)[nombre](...args);
        });
      }
    };
  </script>

  <!-- MAIN -->
  <script>

    let TODAS_OPCIONES = [];

    document.addEventListener('DOMContentLoaded', async () => {

      console.log("HTML cargó OK");

      // 🔹 botón salir
      const btn = document.getElementById('btnSalir');
      if (btn) btn.href = CONFIG.url;

      M.AutoInit();

      document.getElementById('formInscripcion')
        .addEventListener('submit', manejarSubmit);

      document.getElementById('selectBarrio')
        .addEventListener('change', filtrarPorBarrio);

      document.getElementById('selectInstitucion')
        .addEventListener('change', filtrarPorInstitucion);

      await cargarLugares();
    });

    async function cargarLugares() {
      try {
        const opciones = await API.call("obtenerOpcionesCursada");
        TODAS_OPCIONES = opciones;
        actualizarSelects(opciones);
      } catch (err) {
        console.error(err);
      }
    }

    function actualizarSelects(data) {

      const sBarrio = document.getElementById('selectBarrio');
      const sInst = document.getElementById('selectInstitucion');

      const barrios = [...new Set(data.map(i => i.barrio))];

      sBarrio.innerHTML = '<option value="">Todos</option>';
      barrios.forEach(b => {
        sBarrio.innerHTML += `<option value="${b}">${b}</option>`;
      });

      sInst.innerHTML = '<option disabled selected>Seleccione</option>';
      data.forEach(i => {
        let dis = i.deshabilitado ? 'disabled' : '';
        sInst.innerHTML += `<option value="${i.institucion}" ${dis}>${i.texto}</option>`;
      });

      M.FormSelect.init(sBarrio);
      M.FormSelect.init(sInst);
    }

    function filtrarPorBarrio() {
      const barrio = document.getElementById('selectBarrio').value;
      if (!barrio) return actualizarSelects(TODAS_OPCIONES);
      actualizarSelects(TODAS_OPCIONES.filter(o => o.barrio === barrio));
    }

    function filtrarPorInstitucion() {
      const inst = document.getElementById('selectInstitucion').value;
      const encontrado = TODAS_OPCIONES.find(o => o.institucion === inst);

      if (encontrado) {
        document.getElementById('selectBarrio').value = encontrado.barrio;
        M.FormSelect.init(document.getElementById('selectBarrio'));
      }
    }

    async function manejarSubmit(e) {
      e.preventDefault();

      const datos = {
        nombre: nombre.value.trim(),
        apellido: apellido.value.trim(),
        dni: dni.value,
        fechaNac: fechaNacimiento.value,
        email: email.value.trim(),
        tel: telefono.value.trim(),
        cat: categoria.value,
        inst: selectInstitucion.value
      };

      try {

        const res = await API.call("procesarNuevaInscripcion", datos);

        if (res.success) {
          await Swal.fire('OK', 'Inscripción enviada', 'success');
          window.top.location.href = CONFIG.url;
        } else {
          throw new Error(res.message);
        }

      } catch (err) {
        console.error(err);
      }
    }

  </script>

</body>
</html>
